<!doctype html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<title>电商直销 - 智慧农业集成平台</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="css/normalize.css">
	<link rel="stylesheet" href="css/style.css">
	<link rel="stylesheet" href="css/featherlight.min.css">
	<link href='https://fonts.googleapis.com/css?family=Arimo:400,700' rel='stylesheet' type='text/css'>
	<script src="https://code.jquery.com/jquery-latest.min.js"></script>
	<script type="text/javascript" src="js/featherlight.min.js"></script>
	<style>
		.shop-hero { text-align: center; padding: 80px 0 60px; background: #E8F5E9; }
		.shop-hero h2 { color: #1B5E20; font-size: 56px; margin-bottom: 10px; }
		.shop-hero p.subtitle { color: #2E7D32; font-size: 18px; }
		.search-bar { display: flex; justify-content: center; margin: 30px auto 0; max-width: 500px; }
		.search-bar input { flex: 1; padding: 12px 20px; border: 2px solid #C8E6C9; border-radius: 999px 0 0 999px; font-size: 15px; outline: none; }
		.search-bar input:focus { border-color: #2E7D32; }
		.search-bar button { padding: 12px 24px; background: #2E7D32; color: #fff; border: none; border-radius: 0 999px 999px 0; font-weight: 700; cursor: pointer; }
		.category-tabs { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin: 20px auto 0; max-width: 800px; }
		.category-tab { background: #fff; border: 2px solid #C8E6C9; color: #2E7D32; font-family: 'Arimo',sans-serif; font-size: 14px; font-weight: 700; padding: 8px 20px; border-radius: 999px; cursor: pointer; transition: all .3s; }
		.category-tab:hover { background: #E8F5E9; }
		.category-tab.active { background: #2E7D32; color: #fff; border-color: #2E7D32; }
		.product-meta { display: flex; justify-content: space-between; align-items: center; max-width: 1140px; margin: 20px auto 0; padding: 0 20px; color: #999; font-size: 14px; }
		.product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; max-width: 1200px; margin: 20px auto 40px; padding: 0 20px; }
		.product-card { background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 16px rgba(0,0,0,0.06); transition: all .3s; display: flex; flex-direction: column; }
		.product-card:hover { box-shadow: 0 8px 32px rgba(46,125,50,0.15); transform: translateY(-4px); }
		.product-card.featured { border: 2px solid #2E7D32; box-shadow: 0 2px 20px rgba(46,125,50,0.12); }
		.product-card .product-img { width: 100%; height: 200px; background: #E8F5E9; display: flex; align-items: center; justify-content: center; font-size: 56px; color: #81C784; position: relative; }
		.product-card .product-img img { width: 100%; height: 100%; object-fit: cover; }
		.product-card .product-img .badge { position: absolute; top: 12px; left: 12px; background: #2E7D32; color: #fff; font-size: 12px; font-weight: 700; padding: 4px 14px; border-radius: 999px; }
		.product-card .card-body { padding: 20px; flex: 1; display: flex; flex-direction: column; }
		.product-card .card-body h5 { color: #333; font-size: 16px; margin-bottom: 6px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
		.product-card .card-body .desc { color: #999; font-size: 13px; margin-bottom: 12px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
		.product-card .card-body .meta-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
		.product-card .card-body .weight-tag { background: #F1F8E9; color: #558B2F; font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 999px; }
		.product-card .card-body .stock-tag { font-size: 12px; color: #999; }
		.product-card .card-body .price-row { display: flex; align-items: baseline; gap: 6px; margin: auto 0 12px; }
		.product-card .card-body .price { font-family: 'Arimo',sans-serif; font-size: 32px; font-weight: 700; color: #E53935; }
		.product-card .card-body .price .unit { font-size: 15px; font-weight: 400; color: #999; }
		.product-card .card-body .original-price { font-size: 14px; color: #BBB; text-decoration: line-through; }
		.product-card .card-body .features { margin: 0 0 14px; padding: 0; list-style: none; }
		.product-card .card-body .features li { font-size: 12px; color: #888; padding: 2px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
		.product-card .card-body .add-to-cart-btn { width: 100%; padding: 12px; font-family: 'Arimo',sans-serif; font-weight: 700; font-size: 14px; color: #2E7D32; border: 2px solid #2E7D32; border-radius: 999px; cursor: pointer; background: #fff; transition: all .3s; margin-top: auto; }
		.product-card .card-body .add-to-cart-btn:hover { background: #2E7D32; color: #fff; }
		.product-card .card-body .add-to-cart-btn.added { background: #81C784; border-color: #81C784; color: #fff; }
		.product-card .card-body .add-to-cart-btn:disabled { background: #EEE; color: #BBB; border-color: #DDD; cursor: not-allowed; }
		.pagination { display: flex; justify-content: center; gap: 8px; margin: 0 auto 60px; }
		.pagination button { padding: 8px 16px; border: 2px solid #C8E6C9; background: #fff; border-radius: 8px; cursor: pointer; font-weight: 700; color: #2E7D32; font-size: 14px; }
		.pagination button:hover { background: #E8F5E9; }
		.pagination button.active { background: #2E7D32; color: #fff; border-color: #2E7D32; }
		.pagination button:disabled { color: #CCC; cursor: not-allowed; }
		.loading-spinner { text-align: center; padding: 60px; color: #81C784; font-size: 36px; grid-column: 1 / -1; }
		.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #2E7D32; color: #fff; padding: 14px 28px; border-radius: 999px; font-family: 'Arimo', sans-serif; font-weight: 700; font-size: 15px; z-index: 9999; opacity: 0; transition: opacity 0.3s ease; pointer-events: none; }
		.toast.show { opacity: 1; }
		.farmer-section { text-align: center; padding: 80px 0; background: #F1F8E9; }
		.farmer-grid { display: flex; gap: 30px; justify-content: center; flex-wrap: wrap; margin: 40px auto 0; max-width: 1000px; }
		.farmer-card { background: #fff; border-radius: 12px; padding: 30px; width: 300px; text-align: center; box-shadow: 0 2px 16px rgba(0,0,0,0.05); }
		.farmer-card img { width: 120px; height: 120px; border-radius: 999px; background: #E8F5E9; margin-bottom: 16px; object-fit: cover; }
		.farmer-card h5 { color: #2E7D32; margin-bottom: 4px; }
		.farmer-card .village { color: #777; font-size: 14px; margin-bottom: 8px; }
		.farmer-card .story { color: #555; font-size: 15px; line-height: 1.6; }
		.process-section { text-align: center; padding: 80px 0; background: #fff; }
		.process-steps { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin: 40px auto 0; max-width: 1100px; }
		.step-card { background: #F1F8E9; border-radius: 12px; padding: 30px 20px; width: 220px; text-align: center; }
		.step-card .step-num { display: inline-block; width: 48px; height: 48px; line-height: 48px; background: #2E7D32; color: #fff; border-radius: 999px; font-family: 'Arimo', sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 16px; }
		.step-card h5 { color: #2E7D32; margin-bottom: 8px; font-size: 16px; }
		.step-card p { color: #777; font-size: 14px; }
		@media only screen and (max-width: 960px) { .product-card, .farmer-card, .step-card { width: 90%; } }
		.cart-icon-btn { position: fixed; top: 14px; right: 24px; background: #fff; border: 2px solid #2E7D32; border-radius: 50%; width: 44px; height: 44px; font-size: 20px; cursor: pointer; color: #2E7D32; transition: all 0.3s ease; z-index: 1000; display: flex; align-items: center; justify-content: center; }
		.cart-icon-btn:hover { background: #E8F5E9; }
		.cart-badge { position: absolute; top: -6px; right: -6px; background: #E53935; color: #fff; font-size: 11px; font-weight: 700; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
		.cart-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 9998; display: none; }
		.cart-overlay.show { display: block; }
		.cart-sidebar { position: fixed; top: 0; right: -420px; width: 400px; max-width: 90vw; height: 100%; background: #fff; z-index: 9999; display: flex; flex-direction: column; transition: right 0.3s ease; box-shadow: -4px 0 24px rgba(0,0,0,0.1); }
		.cart-sidebar.show { right: 0; }
		.cart-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; border-bottom: 1px solid #E0E0E0; }
		.cart-header h4 { color: #2E7D32; font-size: 18px; margin: 0; }
		.cart-close { background: none; border: none; font-size: 22px; cursor: pointer; color: #999; }
		.cart-close:hover { color: #333; }
		.cart-body { flex: 1; overflow-y: auto; padding: 16px; }
		.cart-item { display: flex; gap: 12px; align-items: center; padding: 12px 0; border-bottom: 1px solid #F0F0F0; }
		.cart-item-img { width: 60px; height: 60px; border-radius: 8px; background: #E8F5E9; display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; }
		.cart-item-img img { width:100%; height:100%; object-fit:cover; border-radius:8px; }
		.cart-item-info { flex: 1; }
		.cart-item-info h5 { font-size: 14px; color: #333; margin-bottom: 4px; }
		.cart-item-info .cart-item-price { color: #2E7D32; font-weight: 700; font-size: 15px; }
		.cart-item-qty { display: flex; align-items: center; gap: 6px; }
		.cart-item-qty button { width: 28px; height: 28px; border: 2px solid #C8E6C9; background: #fff; border-radius: 50%; font-size: 16px; cursor: pointer; color: #2E7D32; line-height: 1; }
		.cart-item-qty button:hover { background: #E8F5E9; }
		.cart-item-qty span { font-weight: 700; min-width: 20px; text-align: center; }
		.cart-item-del { background: none; border: none; color: #CCC; font-size: 16px; cursor: pointer; padding: 4px; }
		.cart-item-del:hover { color: #E53935; }
		.cart-footer { padding: 16px 24px; border-top: 1px solid #E0E0E0; background: #FAFAFA; }
		.cart-total { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 16px; }
		.cart-total .total-price { font-size: 24px; font-weight: 700; color: #E53935; }
		.cart-checkout-btn { width: 100%; padding: 14px; background: #2E7D32; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; }
		.cart-checkout-btn:hover { background: #1B5E20; }
	</style>
</head>
<body>
	<div id="toast" class="toast"></div>
	<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
	<div class="cart-sidebar" id="cartSidebar">
		<div class="cart-header">
			<h4>🛒 <span data-i18n="shop.cart_title">我的购物车</span></h4>
			<button class="cart-close" onclick="closeCart()">✕</button>
		</div>
		<div class="cart-body" id="cartBody">
			<div class="empty-state" style="padding:60px 20px;">
				<div class="icon">🛒</div>
				<p data-i18n="shop.cart_empty">购物车空空如也</p>
				<button onclick="closeCart()" style="margin-top:12px;padding:8px 24px;background:#2E7D32;color:#fff;border:none;border-radius:999px;cursor:pointer;" data-i18n="shop.cart_goshop">去逛逛</button>
			</div>
		</div>
		<div class="cart-footer" id="cartFooter" style="display:none;">
			<div class="cart-total">
				<span data-i18n="shop.cart_total">合计：</span>
				<span class="total-price" id="cartTotal">¥0</span>
			</div>
			<button class="cart-checkout-btn" onclick="checkout()" data-i18n="shop.go_checkout">去结算</button>
		</div>
	</div>

	<header id="top">
		<div class="wrapper">
			<!-- 语言切换按钮 -->
			<a href="javascript:void(0)" class="lang-switch" onclick="var l=localStorage.getItem('chase_lang')||'zh';var nl=l==='zh'?'en':'zh';localStorage.setItem('chase_lang',nl);window.i18n.applyLang(nl);var btns=document.querySelectorAll('.lang-switch');btns.forEach(function(b){b.textContent=nl==='zh'?'EN':'中';});" style="display:inline-block;float:left;margin:65px 16px 0 40px;background:#2E7D32;color:#fff;padding:6px 16px;border-radius:999px;font-weight:700;font-size:13px;text-decoration:none;" onmouseover="this.style.background='#1B5E20'" onmouseout="this.style.background='#2E7D32'" data-i18n="lang.switch">EN</a>
			<h1 class="logo"><a href="index.html" data-i18n="brand.name">智慧农业</a></h1>
			<nav>
				<ul id="navigation">
					<li><a href="index.html" data-i18n="nav.back">返回首页</a></li>
					<li><a href="monitor.html" data-i18n="nav.monitor">种植助手</a></li>
					<li><a href="shop.html" data-i18n="nav.shop">电商直销</a></li>
					<li><a href="logistics.html" data-i18n="nav.logistics">物流协同</a></li>
					<li><a class="nav-cta" href="login.html" data-i18n="nav.login">登录/注册</a></li>
				</ul>
			</nav>
		</div>
	</header>

	<button class="cart-icon-btn" id="cartIconBtn" onclick="openCart()" style="display:none;">🛒<span class="cart-badge" id="cartBadge">0</span></button>

	<section class="shop-hero">
		<div class="wrapper">
			<h2 data-i18n="shop.hero_title">🛒 电商直销</h2>
			<p class="subtitle" data-i18n="shop.hero_subtitle">产地直供，新鲜到家</p>
			<div class="search-bar">
				<input type="text" id="shopSearchInput" data-i18n-placeholder="shop.search_ph" placeholder="搜索农产品..." onkeydown="if(event.key==='Enter')searchShop()">
				<button onclick="searchShop()" data-i18n="shop.search_btn">🔍 搜索</button>
			</div>
		</div>
	</section>

	<a name="products"></a>
	<section class="pricing-section">
		<div class="wrapper">
			<h3>精选产品</h3>
			<p class="subtitle">品质分级，满足不同需求</p>
			<div class="category-tabs" id="categoryTabs">
				<button class="category-tab active" data-category="0" data-i18n="shop.all_cat">全部</button>
			</div>
			<div class="product-meta" id="productMeta" style="display:none;">
				<span id="resultCount"></span>
			</div>
			<div class="product-grid" id="productGrid">
				<div class="loading-spinner" data-i18n="shop.loading">加载中...</div>
			</div>
		</div>
	</section>

	<section class="process-section">
		<div class="wrapper">
			<h3>购买流程</h3>
			<p class="subtitle">从小程序下单到收货，全程可追踪</p>
			<div class="process-steps">
				<div class="step-card"><div class="step-num">1</div><h5>微信小程序下单</h5><p>选择规格，填写地址，在线支付</p></div>
				<div class="step-card"><div class="step-num">2</div><h5>农户接单采摘</h5><p>清晨采摘，确保新鲜度</p></div>
				<div class="step-card"><div class="step-num">3</div><h5>村级集单打包</h5><p>统一送至集单点，批量发货</p></div>
				<div class="step-card"><div class="step-num">4</div><h5>快递冷链配送</h5><p>冰袋保鲜，次日送达</p></div>
			</div>
		</div>
	</section>

	<footer>
		<div class="wrapper">
			<a class="logo" href="index.html" data-i18n="brand.name">智慧农业</a>
			<div class="footer-left">
				<p class="copyright">版权所有 &copy; 2026 智慧农业集成平台 - 电商直销</p>
			</div>
			<div class="footer-right">
				<a href="index.html" class="back-link" data-i18n="nav.back_main">← 返回主页面</a>
			</div>
			<div class="clear"></div>
		</div>
	</footer>

	<script src="js/i18n.js"></script>
	<script src="js/auth-ui.js"></script>
	<script>
		const API_BASE = window.location.origin + '/api';
		let allProducts = [];
		let allCategories = [];
		const T = function(k,p){return (window.i18n&&window.i18n.t)?window.i18n.t(k,p):k;};

		function showToast(msg) {
			const t = document.getElementById('toast');
			t.textContent = msg;
			t.classList.add('show');
			setTimeout(() => t.classList.remove('show'), 2000);
		}
		function getToken() { return localStorage.getItem('chase_shop_token'); }

		async function loadCategories() {
			try {
				const res = await fetch(API_BASE + '/products/categories');
				const data = await res.json();
				if (data.code === 200) { allCategories = data.data; renderCategoryTabs(); }
			} catch (err) { console.error('加载分类失败:', err); }
		}

		function renderCategoryTabs() {
			const container = document.getElementById('categoryTabs');
			let html = '<button class="category-tab active" data-category="0">'+T('shop.all_cat')+'</button>';
			allCategories.forEach(cat => { html += '<button class="category-tab" data-category="'+cat.id+'">'+cat.icon+' '+cat.name+'</button>'; });
			container.innerHTML = html;
			container.querySelectorAll('.category-tab').forEach(btn => {
				btn.addEventListener('click', function() {
					container.querySelectorAll('.category-tab').forEach(b => b.classList.remove('active'));
					this.classList.add('active');
					filterProducts(this.dataset.category);
				});
			});
		}

		async function loadProducts(categoryId) {
			try {
				const params = new URLSearchParams({ pageSize: 200 });
				if (categoryId && categoryId !== '0') params.append('category_id', categoryId);
				const res = await fetch(API_BASE + '/products?' + params.toString());
				const data = await res.json();
				if (data.code === 200) { allProducts = data.data.list; renderProducts(allProducts); }
			} catch (err) {
				document.getElementById('productGrid').innerHTML = '<div class="loading-spinner" style="color:#E53935;">加载失败，请刷新重试</div>';
			}
		}

		let currentCategory = '0', currentPage = 1, currentKeyword = '';
		const PAGE_SIZE = 12;

		function searchShop() {
			currentKeyword = document.getElementById('shopSearchInput').value.trim();
			currentPage = 1; currentCategory = '0';
			document.querySelectorAll('.category-tab').forEach(b => { b.classList.remove('active'); if(b.dataset.category==='0')b.classList.add('active'); });
			doFilter();
		}
		function filterProducts(categoryId) { currentCategory = categoryId || '0'; currentPage = 1; doFilter(); }
		function doFilter() {
			let list = allProducts;
			if (currentCategory && currentCategory !== '0') list = list.filter(p => p.category_id === parseInt(currentCategory));
			if (currentKeyword) { const kw = currentKeyword.toLowerCase(); list = list.filter(p => (p.name&&p.name.toLowerCase().includes(kw))||(p.description&&p.description.toLowerCase().includes(kw))); }
			renderProducts(list);
		}

		function renderProducts(products) {
			const container = document.getElementById('productGrid');
			const meta = document.getElementById('productMeta');
			if (products.length === 0) {
				container.innerHTML = '<div class="loading-spinner">'+T('shop.empty_title')+'</div>';
				meta.style.display = 'none';
				return;
			}
			meta.style.display = 'flex';
			document.getElementById('resultCount').textContent = T('shop.result_count',{total:products.length});
			const totalPages = Math.ceil(products.length / PAGE_SIZE);
			const start = (currentPage - 1) * PAGE_SIZE;
			const pageItems = products.slice(start, start + PAGE_SIZE);
			let html = '';
			pageItems.forEach(p => {
				const specs = (p.specs || '').split('\n').filter(s => s.trim()).slice(0, 3);
				const specHtml = specs.map(s => '<li>✓ '+s+'</li>').join('');
				const featuredClass = p.is_featured ? ' featured' : '';
				const imgTag = p.image ? '<img src="'+p.image+'" alt="'+p.name+'" loading="lazy">' : '🍑';
				const discount = p.original_price ? Math.round((1 - p.price / p.original_price) * 100) : 0;
				const addCartText = p.stock > 0 ? T('shop.add_cart') : T('shop.nostock');
				html += '<div class="product-card'+featuredClass+'">'+
					'<div class="product-img">'+(p.badge?'<span class="badge">'+p.badge+'</span>':'')+imgTag+'</div>'+
					'<div class="card-body">'+
					'<h5 title="'+p.name+'">'+p.name+'</h5>'+
					'<div class="desc">'+(p.description||'')+'</div>'+
					'<div class="meta-row">'+
					(p.weight?'<span class="weight-tag">'+p.weight+'</span>':'')+
					(p.stock>0?'<span class="stock-tag">'+T('shop.instock',{stock:p.stock})+'</span>':'<span class="stock-tag" style="color:#E53935;">'+T('shop.nostock')+'</span>')+
					'</div>'+
					'<ul class="features">'+specHtml+'</ul>'+
					'<div class="price-row">'+
					'<span class="price"><span class="unit">¥</span>'+p.price+'</span>'+
					(p.original_price?'<span class="original-price">¥'+p.original_price+'</span>':'')+
					(discount>0?'<span style="font-size:12px;color:#E53935;font-weight:700;">-'+discount+'%</span>':'')+
					'</div>'+
					'<button class="add-to-cart-btn" onclick="addToCart('+p.id+', this)" '+(p.stock<=0?'disabled':'')+'>'+addCartText+'</button>'+
					'</div></div>';
			});
			container.innerHTML = html;
			renderPagination(totalPages, products.length);
		}

		function renderPagination(totalPages, totalCount) {
			let pager = document.getElementById('pagination');
			if (!pager) {
				const grid = document.getElementById('productGrid');
				pager = document.createElement('div'); pager.id = 'pagination'; pager.className = 'pagination';
				grid.parentNode.insertBefore(pager, grid.nextSibling);
			}
			if (totalPages <= 1) { pager.innerHTML = ''; return; }
			let startPage = Math.max(1, currentPage - 4);
			let endPage = Math.min(totalPages, startPage + 9);
			if (endPage - startPage < 9) startPage = Math.max(1, endPage - 9);
			let btns = '';
			btns += '<button onclick="goPage('+(currentPage-1)+')" '+(currentPage<=1?'disabled':'')+'>‹</button>';
			if (startPage > 1) { btns += '<button onclick="goPage(1)">1</button>'; if(startPage>2) btns += '<span style="padding:8px 4px;color:#999;">…</span>'; }
			for (let i = startPage; i <= endPage; i++) btns += '<button class="'+(i===currentPage?'active':'')+'" onclick="goPage('+i+')">'+i+'</button>';
			if (endPage < totalPages) { if(endPage<totalPages-1) btns += '<span style="padding:8px 4px;color:#999;">…</span>'; btns += '<button onclick="goPage('+totalPages+')">'+totalPages+'</button>'; }
			btns += '<button onclick="goPage('+(currentPage+1)+')" '+(currentPage>=totalPages?'disabled':'')+'>›</button>';
			pager.innerHTML = btns;
		}

		function goPage(page) { currentPage = page; doFilter(); window.scrollTo({top: 400, behavior: 'smooth'}); }

		async function addToCart(productId, btn) {
			const token = getToken();
			if (!token) { showToast(T('shop.toast_login')); return; }
			try {
				const res = await fetch(API_BASE + '/cart', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify({ product_id: productId, quantity: 1 }) });
				const data = await res.json();
				if (data.code === 200) {
					btn.classList.add('added'); btn.textContent = '✓'; showToast(T('shop.toast_added'));
					setTimeout(() => { btn.classList.remove('added'); btn.textContent = T('shop.add_cart'); }, 2000);
				} else { showToast(data.msg || T('user.op_failed')); }
			} catch (err) { showToast('网络错误，请重试'); }
		}

		function openCart() {
			const token = getToken();
			if (!token) { showToast(T('shop.toast_login')); return; }
			document.getElementById('cartOverlay').classList.add('show');
			document.getElementById('cartSidebar').classList.add('show');
			loadCart();
		}
		function closeCart() {
			document.getElementById('cartOverlay').classList.remove('show');
			document.getElementById('cartSidebar').classList.remove('show');
		}

		async function loadCart() {
			const token = getToken(); if (!token) return;
			try {
				const res = await fetch(API_BASE + '/cart', { headers: { 'Authorization': 'Bearer ' + token } });
				const data = await res.json();
				if (data.code === 200) renderCart(data.data);
			} catch (err) {}
		}

		function renderCart(items) {
			const body = document.getElementById('cartBody');
			const footer = document.getElementById('cartFooter');
			const badge = document.getElementById('cartBadge');
			if (!items || items.length === 0) {
				body.innerHTML = '<div class="empty-state" style="padding:60px 20px;"><div class="icon">🛒</div><p>'+T('shop.cart_empty')+'</p><button onclick="closeCart()" style="margin-top:12px;padding:8px 24px;background:#2E7D32;color:#fff;border:none;border-radius:999px;cursor:pointer;">'+T('shop.cart_goshop')+'</button></div>';
				footer.style.display = 'none'; badge.textContent = '0'; return;
			}
			badge.textContent = items.length;
			let total = 0;
			body.innerHTML = items.map(item => {
				const subtotal = item.price * item.quantity; total += subtotal;
				return '<div class="cart-item"><div class="cart-item-img">'+(item.product_image?'<img src="'+item.product_image+'" alt="'+item.product_name+'">':'🍑')+'</div><div class="cart-item-info"><h5>'+item.product_name+'</h5><div class="cart-item-price">¥'+item.price+' × '+item.quantity+' = ¥'+subtotal.toFixed(2)+'</div></div><div class="cart-item-qty"><button onclick="changeQty('+item.id+','+(item.quantity-1)+')">−</button><span>'+item.quantity+'</span><button onclick="changeQty('+item.id+','+(item.quantity+1)+')">+</button></div><button class="cart-item-del" onclick="removeCartItem('+item.id+')">🗑</button></div>';
			}).join('');
			document.getElementById('cartTotal').textContent = '¥' + total.toFixed(2);
			footer.style.display = 'block';
		}

		async function changeQty(cartId, newQty) {
			if (newQty < 1) { removeCartItem(cartId); return; }
			const token = getToken();
			try {
				const res = await fetch(API_BASE + '/cart/' + cartId, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify({ quantity: newQty }) });
				const data = await res.json();
				if (data.code === 200) loadCart(); else showToast(data.msg);
			} catch (err) { showToast(T('user.op_failed')); }
		}
		async function removeCartItem(cartId) {
			const token = getToken();
			try { await fetch(API_BASE + '/cart/' + cartId, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } }); loadCart(); }
			catch (err) { showToast(T('user.op_failed')); }
		}
		async function checkout() {
			const token = getToken(); if (!token) { showToast(T('shop.toast_login')); return; }
			try {
				const res = await fetch(API_BASE + '/cart', { headers: { 'Authorization': 'Bearer ' + token } });
				const data = await res.json();
				if (data.code === 200 && data.data && data.data.length > 0) {
					const cartIds = data.data.map(item => item.id).join(',');
					closeCart();
					window.location.href = 'checkout.html?cart_ids=' + cartIds;
				} else { showToast(T('shop.cart_empty')); }
			} catch (err) { showToast('加载购物车失败'); }
		}

		const origAddToCart = addToCart;
		addToCart = async function(productId, btn) {
			await origAddToCart(productId, btn);
			const token = getToken();
			if (token) {
				try {
					const res = await fetch(API_BASE + '/cart', { headers: { 'Authorization': 'Bearer ' + token } });
					const data = await res.json();
					if (data.code === 200) document.getElementById('cartBadge').textContent = data.data.length || '0';
				} catch(e) {}
			}
		};

		function updateCartIcon() {
			const btn = document.getElementById('cartIconBtn');
			if (getToken()) {
				btn.style.display = 'inline-flex';
				fetch(API_BASE + '/cart', { headers: { 'Authorization': 'Bearer ' + getToken() } })
					.then(r => r.json()).then(d => { if(d.code===200) document.getElementById('cartBadge').textContent = d.data.length || '0'; }).catch(()=>{});
			} else { btn.style.display = 'none'; }
		}

		async function init() {
			await loadCategories();
			await loadProducts();
			setTimeout(updateCartIcon, 500);
		}
		init();
	</script>
</body>
