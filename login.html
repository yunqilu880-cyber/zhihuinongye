<!doctype html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<title>登录注册 - 智慧农业</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="css/normalize.css">
	<link rel="stylesheet" href="css/style.css">
	<style>
		.auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #E8F5E9 0%, #C8E6C9 50%, #A5D6A7 100%); }
		.auth-container { background: #fff; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); width: 420px; max-width: 95%; overflow: hidden; }
		.auth-tabs { display: flex; }
		.auth-tab { flex: 1; text-align: center; padding: 18px 0; font-family: 'Arimo', sans-serif; font-weight: 700; font-size: 17px; color: #999; background: #F5F5F5; cursor: pointer; border: none; transition: all 0.3s ease; }
		.auth-tab.active { background: #fff; color: #2E7D32; border-bottom: 3px solid #2E7D32; }
		.auth-form { padding: 40px 36px; display: none; }
		.auth-form.active { display: block; }
		.auth-form h3 { text-align: center; color: #2E7D32; font-size: 28px; margin-bottom: 8px; }
		.auth-form .desc { text-align: center; color: #999; font-size: 14px; margin-bottom: 28px; }
		.form-group { margin-bottom: 20px; }
		.form-group label { display: block; font-family: 'Arimo', sans-serif; font-weight: 700; font-size: 13px; color: #666; margin-bottom: 6px; }
		.form-group input { width: 100%; padding: 14px 16px; border: 2px solid #E0E0E0; border-radius: 10px; font-size: 16px; transition: border-color 0.3s ease; outline: none; box-sizing: border-box; }
		.form-group input:focus { border-color: #2E7D32; }
		.form-group input::placeholder { font-size: 15px; font-weight: 400; color: #AAA; font-family: inherit; }
		.auth-submit { width: 100%; padding: 16px; background: #2E7D32; color: #fff; border: none; border-radius: 10px; font-size: 17px; font-family: 'Arimo', sans-serif; font-weight: 700; cursor: pointer; transition: background 0.3s ease; margin-top: 8px; }
		.auth-submit:hover { background: #1B5E20; }
		.auth-submit:disabled { background: #A5D6A7; cursor: not-allowed; }
		.auth-error { background: #FFEBEE; color: #C62828; padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-bottom: 16px; display: none; }
		.auth-error.show { display: block; }
		.back-link { display: block; text-align: center; margin-top: 20px; color: #999; font-size: 14px; text-decoration: none; }
		.back-link:hover { color: #2E7D32; }
	</style>
</head>
<body>

	<div class="auth-page">
		<div class="auth-container">
			<div class="auth-tabs">
				<button class="auth-tab active" onclick="switchTab('login')" data-i18n="login.tab_login">登录</button>
				<button class="auth-tab" onclick="switchTab('register')" data-i18n="login.tab_register">注册</button>
			</div>

			<!-- 登录表单 -->
			<form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
				<h3 data-i18n="login.welcome">欢迎回来</h3>
				<p class="desc" data-i18n="login.desc">登录您的智慧农业账户</p>
				<div class="auth-error" id="loginError"></div>
				<div class="form-group">
					<label data-i18n="login.username">账号</label>
					<input type="text" id="loginUsername" data-i18n-placeholder="login.username_ph" placeholder="请输入账号" required>
				</div>
				<div class="form-group">
					<label data-i18n="login.password">密码</label>
					<input type="password" id="loginPassword" data-i18n-placeholder="login.password_ph" placeholder="请输入密码" required>
				</div>
				<button type="submit" class="auth-submit" id="loginBtn" data-i18n="login.btn_login">登 录</button>
				<a href="index.html" class="back-link" data-i18n="login.back">← 返回首页</a>
			</form>

			<!-- 注册表单 -->
			<form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">
				<h3 data-i18n="login.register_title">创建账户</h3>
				<p class="desc" data-i18n="login.register_desc">加入智慧农业，享受产地直供</p>
				<div class="auth-error" id="registerError"></div>
				<div class="form-group">
					<label data-i18n="login.username">账号</label>
					<input type="text" id="registerUsername" data-i18n-placeholder="login.username_ph" placeholder="请输入账号" required>
				</div>
				<div class="form-group">
					<label data-i18n="login.password">密码</label>
					<input type="password" id="registerPassword" data-i18n-placeholder="login.password_ph" placeholder="请输入密码" required>
				</div>
				<div class="form-group">
					<label data-i18n="login.register_name">昵称（可选）</label>
					<input type="text" id="registerName" data-i18n-placeholder="login.register_name_ph" placeholder="请输入昵称（可选）">
				</div>
				<button type="submit" class="auth-submit" id="registerBtn" data-i18n="login.btn_register">注 册</button>
				<a href="index.html" class="back-link" data-i18n="login.back">← 返回首页</a>
			</form>
		</div>
	</div>

	<script src="js/i18n.js"></script>
	<script>
		const API_BASE = window.location.origin + '/api';

		function switchTab(type) {
			document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
			document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
			if (type === 'login') {
				document.querySelectorAll('.auth-tab')[0].classList.add('active');
				document.getElementById('loginForm').classList.add('active');
			} else {
				document.querySelectorAll('.auth-tab')[1].classList.add('active');
				document.getElementById('registerForm').classList.add('active');
			}
			hideErrors();
		}

		function hideErrors() {
			document.getElementById('loginError').classList.remove('show');
			document.getElementById('registerError').classList.remove('show');
		}

		function showError(type, msg) {
			const el = document.getElementById(type + 'Error');
			el.textContent = msg;
			el.classList.add('show');
		}

		// 登录
		async function handleLogin(e) {
			e.preventDefault();
			hideErrors();
			const username = document.getElementById('loginUsername').value.trim();
			const password = document.getElementById('loginPassword').value;

			if (!username || !password) {
				return showError('login', window.i18n.t('login.err_required'));
			}

			const btn = document.getElementById('loginBtn');
			btn.disabled = true;
			btn.textContent = window.i18n.t('login.btn_logging');

			try {
				const res = await fetch(API_BASE + '/users/login', {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({ username, password }),
				});
				const data = await res.json();
				if (data.code === 200) {
					localStorage.setItem('chase_shop_token', data.data.token);
					localStorage.setItem('chase_shop_user', JSON.stringify(data.data.user));
					const returnUrl = getUrlParam('redirect') || 'index.html';
					window.location.href = returnUrl;
				} else {
					showError('login', data.msg || window.i18n.t('login.err_login_fail'));
				}
			} catch (err) {
				showError('login', window.i18n.t('login.err_network'));
			} finally {
				btn.disabled = false;
				btn.textContent = window.i18n.t('login.btn_login');
			}
		}

		// 注册
		async function handleRegister(e) {
			e.preventDefault();
			hideErrors();
			const username = document.getElementById('registerUsername').value.trim();
			const password = document.getElementById('registerPassword').value;
			const name = document.getElementById('registerName').value.trim();

			if (!username || !password) {
				return showError('register', window.i18n.t('login.err_required'));
			}

			const btn = document.getElementById('registerBtn');
			btn.disabled = true;
			btn.textContent = window.i18n.t('login.btn_registering');

			try {
				const res = await fetch(API_BASE + '/users/register', {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({ username, password, name }),
				});
				const data = await res.json();
				if (data.code === 200) {
					localStorage.setItem('chase_shop_token', data.data.token);
					localStorage.setItem('chase_shop_user', JSON.stringify(data.data.user));
					const returnUrl = getUrlParam('redirect') || 'index.html';
					window.location.href = returnUrl;
				} else {
					showError('register', data.msg || window.i18n.t('login.err_register_fail'));
				}
			} catch (err) {
				showError('register', window.i18n.t('login.err_network'));
			} finally {
				btn.disabled = false;
				btn.textContent = window.i18n.t('login.btn_register');
			}
		}

		function getUrlParam(name) {
			const params = new URLSearchParams(window.location.search);
			return params.get(name);
		}
	</script>
</body>
</html>
