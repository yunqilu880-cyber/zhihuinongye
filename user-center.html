<!doctype html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<title>个人中心 - 智慧农业</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="css/normalize.css">
	<link rel="stylesheet" href="css/style.css">
	<script src="js/auth-ui.js"></script>
	<style>
		.user-hero {
			text-align: center;
			padding: 80px 0 60px;
			background: linear-gradient(135deg, #E8F5E9, #C8E6C9);
		}
		.user-hero .avatar {
			width: 100px;
			height: 100px;
			border-radius: 50%;
			background: #2E7D32;
			color: #fff;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 42px;
			margin: 0 auto 16px;
		}
		.user-hero h2 { color: #1B5E20; font-size: 32px; margin-bottom: 4px; }
		.user-hero p { color: #666; }
		.user-tabs {
			display: flex;
			justify-content: center;
			gap: 0;
			margin: 0 auto;
			max-width: 600px;
			border-bottom: 2px solid #E0E0E0;
		}
		.user-tab {
			flex: 1;
			text-align: center;
			padding: 14px 0;
			font-family: 'Arimo', sans-serif;
			font-weight: 700;
			font-size: 15px;
			color: #999;
			cursor: pointer;
			border: none;
			background: none;
			border-bottom: 3px solid transparent;
			margin-bottom: -2px;
			transition: all 0.3s ease;
		}
		.user-tab.active {
			color: #2E7D32;
			border-bottom-color: #2E7D32;
		}
		.tab-content {
			display: none;
			padding: 40px 0;
			max-width: 800px;
			margin: 0 auto;
		}
		.tab-content.active { display: block; }

		.order-item {
			background: #fff;
			border-radius: 12px;
			padding: 20px 24px;
			margin-bottom: 16px;
			box-shadow: 0 2px 12px rgba(0,0,0,0.04);
		}
		.order-item .order-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 12px;
		}
		.order-item .order-no { color: #999; font-size: 13px; }
		.order-item .order-status {
			font-weight: 700;
			font-size: 14px;
		}
		.status-pending { color: #F57C00; }
		.status-paid { color: #1976D2; }
		.status-shipped { color: #388E3C; }
		.status-delivered { color: #2E7D32; }
		.status-completed { color: #2E7D32; }
		.status-cancelled { color: #999; }

		.order-item .order-product {
			display: flex;
			gap: 12px;
			align-items: center;
			margin-bottom: 8px;
		}
		.order-item .order-product img {
			width: 60px;
			height: 60px;
			border-radius: 8px;
			background: #E8F5E9;
			object-fit: cover;
		}
		.order-item .order-info { flex: 1; }
		.order-item .order-info h5 { color: #333; margin-bottom: 4px; }
		.order-item .order-info .meta { color: #999; font-size: 13px; }
		.order-item .order-total {
			text-align: right;
			font-weight: 700;
			color: #2E7D32;
			font-size: 18px;
			margin-top: 8px;
		}
		.order-item .order-actions { margin-top: 12px; text-align: right; }
		.order-item .order-actions button {
			padding: 8px 20px;
			border-radius: 999px;
			border: 2px solid #2E7D32;
			background: #fff;
			color: #2E7D32;
			font-family: 'Arimo', sans-serif;
			font-weight: 700;
			font-size: 13px;
			cursor: pointer;
			margin-left: 8px;
			transition: all 0.3s ease;
		}
		.order-item .order-actions button:hover {
			background: #2E7D32;
			color: #fff;
		}
		.order-item .order-actions button.danger {
			border-color: #E53935;
			color: #E53935;
		}
		.order-item .order-actions button.danger:hover {
			background: #E53935;
			color: #fff;
		}

		.address-card {
			background: #fff;
			border-radius: 12px;
			padding: 20px;
			margin-bottom: 12px;
			box-shadow: 0 2px 12px rgba(0,0,0,0.04);
		}
		.address-card .label {
			display: inline-block;
			background: #E8F5E9;
			color: #2E7D32;
			font-size: 12px;
			font-weight: 700;
			padding: 3px 10px;
			border-radius: 999px;
			margin-bottom: 8px;
		}
		.address-card .name-phone { font-weight: 700; color: #333; margin-bottom: 4px; }
		.address-card .full-address { color: #666; font-size: 14px; }
		.address-card .addr-actions { margin-top: 12px; text-align: right; }

		.empty-state {
			text-align: center;
			padding: 60px 20px;
			color: #999;
		}
		.empty-state .icon { font-size: 64px; margin-bottom: 16px; }
		.toast {
			position: fixed;
			top: 20px;
			left: 50%;
			transform: translateX(-50%);
			background: #2E7D32;
			color: #fff;
			padding: 12px 24px;
			border-radius: 999px;
			z-index: 9999;
			opacity: 0;
			transition: opacity 0.3s ease;
			pointer-events: none;
			font-family: 'Arimo', sans-serif;
			font-weight: 700;
		}
		.toast.show { opacity: 1; }

		.search-row { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
		.search-row select { padding: 8px 14px; border: 2px solid #E0E0E0; border-radius: 8px; font-size: 14px; outline: none; }
		.search-row select:focus { border-color: #2E7D32; }
		.pagination { display: flex; justify-content: center; gap: 8px; padding: 10px; }
		.pagination button { padding: 6px 12px; border: 2px solid #C8E6C9; background: #fff; border-radius: 8px; cursor: pointer; font-weight: 700; color: #2E7D32; }
		.pagination button.active { background: #2E7D32; color: #fff; border-color: #2E7D32; }
		.pagination button:disabled { color: #CCC; cursor: not-allowed; }

		@media only screen and (max-width: 600px) {
			.tab-content { padding: 20px 12px; }
		}
	</style>
</head>
<body>
	<div id="toast" class="toast"></div>

	<header id="top">
		<div class="wrapper">
			<h1 class="logo"><a href="index.html">智慧农业</a></h1>
			<nav>
				<ul id="navigation">
					<li><a href="index.html">返回首页</a></li>
					<li><a href="monitor.html">种植助手</a></li>
					<li><a href="shop.html">电商直销</a></li>
					<li><a href="logistics.html">物流协同</a></li>
					<li><a class="nav-cta" href="login.html">登录/注册</a></li>
				</ul>
			</nav>
		</div>
	</header>

	<section class="user-hero" id="userHero">
		<div class="wrapper">
			<div class="avatar" id="userAvatar">👤</div>
			<h2 id="userName">用户</h2>
			<p id="userUsername">加载中...</p>
		</div>
	</section>

	<div class="user-tabs">
		<button class="user-tab active" onclick="switchTab('orders')">我的订单</button>
		<button class="user-tab" onclick="switchTab('addresses')">收货地址</button>
		<button class="user-tab" onclick="switchTab('profile')">账户设置</button>
	</div>

	<!-- 订单列表 -->
	<div class="tab-content active" id="tab-orders">
		<div class="search-row" style="margin-bottom:12px;">
			<select id="orderStatusFilter" onchange="changeOrderStatus()">
				<option value="">全部订单</option>
				<option value="pending">待支付</option>
				<option value="paid">已支付</option>
				<option value="shipped">已发货</option>
				<option value="completed">已完成</option>
				<option value="cancelled">已取消</option>
			</select>
		</div>
		<div id="orderList"><div class="empty-state"><div class="icon">📦</div>加载中...</div></div>
		<div class="pagination" id="orderPager"></div>
	</div>

	<!-- 收货地址 -->
	<div class="tab-content" id="tab-addresses">
		<div id="addressList">
			<div class="empty-state"><div class="icon">📍</div>加载中...</div>
		</div>
		<div style="text-align:center;padding:20px;">
			<button onclick="showAddAddress()" class="auth-submit" style="max-width:300px;">➕ 新增地址</button>
		</div>
		<!-- 新增地址表单（默认隐藏） -->
		<div id="addressForm" style="display:none;max-width:500px;margin:20px auto;background:#fff;border-radius:12px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,0.04);">
			<h4 style="color:#2E7D32;margin-bottom:16px;">新增收货地址</h4>
			<div class="form-group">
				<label>收货人</label>
				<input type="text" id="addrName" placeholder="请输入收货人姓名">
			</div>
			<div class="form-group">
				<label>手机号</label>
				<input type="text" id="addrPhone" placeholder="请输入收货电话">
			</div>
			<div class="form-group" style="display:flex;gap:10px;">
				<input type="text" id="addrProvince" placeholder="省" style="flex:1;">
				<input type="text" id="addrCity" placeholder="市" style="flex:1;">
				<input type="text" id="addrDistrict" placeholder="区" style="flex:1;">
			</div>
			<div class="form-group">
				<label>详细地址</label>
				<input type="text" id="addrDetail" placeholder="街道/门牌号">
			</div>
			<div style="display:flex;gap:10px;margin-top:16px;">
				<button onclick="saveAddress()" class="auth-submit" style="flex:1;max-width:200px;">保 存</button>
				<button onclick="hideAddressForm()" style="flex:1;max-width:200px;background:#eee;color:#666;border:none;border-radius:10px;font-size:14px;cursor:pointer;">取 消</button>
			</div>
		</div>
	</div>

	<!-- 账户设置 -->
	<div class="tab-content" id="tab-profile" style="max-width:500px;">
		<div class="form-group">
			<label>昵称</label>
			<input type="text" id="profileName" placeholder="请输入昵称">
		</div>
		<button onclick="updateProfile()" class="auth-submit">保存修改</button>
		<hr style="margin:24px 0;border-color:#E0E0E0;">
		<h4 style="color:#2E7D32;margin-bottom:12px;">修改密码</h4>
		<div class="form-group">
			<label>原密码</label>
			<input type="password" id="oldPassword" placeholder="请输入原密码">
		</div>
		<div class="form-group">
			<label>新密码</label>
			<input type="password" id="newPassword" placeholder="请输入新密码">
		</div>
		<button onclick="changePassword()" class="auth-submit" style="background:#F57C00;border-color:#F57C00;">修改密码</button>
	</div>

	<footer>
		<div class="wrapper">
			<a class="logo" href="index.html">智慧农业</a>
			<div class="footer-left">
				<p class="copyright">版权所有 &copy; 2026 智慧农业集成平台</p>
			</div>
			<div class="clear"></div>
		</div>
	</footer>

	<script>
		const API_BASE = window.location.origin + '/api';
		const token = localStorage.getItem('chase_shop_token');
		const userStr = localStorage.getItem('chase_shop_user');
		const user = userStr ? JSON.parse(userStr) : null;

		if (!token) {
			window.location.href = 'login.html?redirect=user-center.html';
		}

		// 更新用户信息显示
		if (user) {
			document.getElementById('userName').textContent = user.name || '用户';
			document.getElementById('userUsername').textContent = user.username;
			document.getElementById('userAvatar').textContent = (user.name || '用')[0];
			document.getElementById('profileName').value = user.name || '';
		}

		// Toast
		function showToast(msg) {
			const t = document.getElementById('toast');
			t.textContent = msg;
			t.classList.add('show');
			setTimeout(() => t.classList.remove('show'), 2000);
		}

		// 切换标签
		function switchTab(name) {
			document.querySelectorAll('.user-tab').forEach(t => t.classList.remove('active'));
			document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
			event.target.classList.add('active');
			document.getElementById('tab-' + name).classList.add('active');
			if (name === 'orders') loadOrders();
			if (name === 'addresses') loadAddresses();
		}

		// ===== 订单 =====
		let orderPage = 1;
		let orderFilterStatus = '';
		const ORDER_PAGE_SIZE = 8;

		function changeOrderStatus() {
			orderFilterStatus = document.getElementById('orderStatusFilter').value;
			orderPage = 1;
			loadOrders();
		}

		async function loadOrders(page) {
			if (page) orderPage = page;
			const container = document.getElementById('orderList');
			const pager = document.getElementById('orderPager');
			try {
				const params = new URLSearchParams({ page: orderPage, pageSize: ORDER_PAGE_SIZE });
				if (orderFilterStatus) params.append('status', orderFilterStatus);
				const res = await fetch(API_BASE + '/orders?' + params.toString(), {
					headers: { 'Authorization': 'Bearer ' + token },
				});
				const data = await res.json();
				if (data.code === 200 && data.data.list.length > 0) {
					const { list, total, page, totalPages } = data.data;
					const statusMap = { pending: '待支付', paid: '已支付', shipped: '已发货', delivered: '运输中', completed: '已完成', cancelled: '已取消', refunding: '退款中', refunded: '已退款' };
					container.innerHTML = list.map(o => `
						<div class="order-item">
							<div class="order-header">
								<span class="order-no">订单号：${o.order_no}</span>
								<span class="order-status status-${o.status}">${statusMap[o.status] || o.status}</span>
							</div>
							<div class="order-product">
								<div class="order-info">
									<h5>共 ${o.item_count} 件商品 · ¥${o.total_amount}</h5>
									<div class="meta">${new Date(o.created_at).toLocaleString('zh-CN')} | ${o.receiver_name} ${o.receiver_phone} | ${o.receiver_address}</div>
								</div>
							</div>
							<div class="order-actions">
								${o.status === 'pending' ? `<button onclick="payOrder(${o.id})" style="border-color:#1976D2;color:#1976D2;">去付款</button><button class="danger" onclick="cancelOrder(${o.id})">取消</button>` : ''}
								${o.status === 'paid' ? `<span style="color:#1976D2;font-size:13px;">等待发货</span>` : ''}
								${o.status === 'shipped' ? `<button onclick="confirmOrder(${o.id})">确认收货</button>` : ''}
								${o.status === 'completed' ? `<span style="color:#2E7D32;font-size:13px;">已完成</span>` : ''}
							</div>
						</div>
					`).join('');
					// 分页
					if (totalPages > 1) {
						let pg = '<button onclick="loadOrders('+(page-1)+')" '+(page<=1?'disabled':'')+'>‹</button>';
						for (let i = 1; i <= totalPages; i++) pg += '<button class="'+(i===page?'active':'')+'" onclick="loadOrders('+i+')">'+i+'</button>';
						pg += '<button onclick="loadOrders('+(page+1)+')" '+(page>=totalPages?'disabled':'')+'>›</button>';
						pager.innerHTML = pg;
					} else { pager.innerHTML = ''; }
				} else {
					container.innerHTML = '<div class="empty-state"><div class="icon">📦</div>暂无订单<br><a href="shop.html">去逛逛 →</a></div>';
					pager.innerHTML = '';
				}
			} catch (err) {
				container.innerHTML = '<div class="empty-state" style="color:#E53935;">加载失败</div>';
				pager.innerHTML = '';
			}
		}

		async function payOrder(orderId) {
			if (!confirm('确认支付此订单？')) return;
			try {
				const res = await fetch(API_BASE + '/orders/' + orderId + '/pay', {
					method: 'PUT',
					headers: { 'Authorization': 'Bearer ' + token },
				});
				const data = await res.json();
				if (data.code === 200) { showToast('支付成功'); loadOrders(); }
				else showToast(data.msg);
			} catch (err) { showToast('操作失败'); }
		}

		async function cancelOrder(id) {
			if (!confirm('确定取消此订单？')) return;
			try {
				const res = await fetch(API_BASE + '/orders/' + id + '/cancel', {
					method: 'PUT',
					headers: { 'Authorization': 'Bearer ' + token },
				});
				const data = await res.json();
				if (data.code === 200) { showToast('订单已取消'); loadOrders(); }
				else showToast(data.msg);
			} catch (err) { showToast('操作失败'); }
		}

		async function confirmOrder(id) {
			if (!confirm('确认已收到商品？')) return;
			try {
				const res = await fetch(API_BASE + '/orders/' + id + '/confirm', {
					method: 'PUT',
					headers: { 'Authorization': 'Bearer ' + token },
				});
				const data = await res.json();
				if (data.code === 200) { showToast('已确认收货'); loadOrders(); }
				else showToast(data.msg);
			} catch (err) { showToast('操作失败'); }
		}

		// ===== 地址 =====
		async function loadAddresses() {
			const container = document.getElementById('addressList');
			try {
				const res = await fetch(API_BASE + '/addresses', {
					headers: { 'Authorization': 'Bearer ' + token },
				});
				const data = await res.json();
				if (data.code === 200 && data.data.length > 0) {
					container.innerHTML = data.data.map(a => `
						<div class="address-card">
							${a.is_default ? '<span class="label">默认</span>' : ''}
							<div class="name-phone">${a.receiver_name} &nbsp; ${a.receiver_phone}</div>
							<div class="full-address">${a.province}${a.city}${a.district} ${a.detail}</div>
							<div class="addr-actions">
								<button onclick="deleteAddress(${a.id})" style="border-color:#E53935;color:#E53935;background:#fff;padding:6px 16px;border-radius:999px;cursor:pointer;">删除</button>
							</div>
						</div>
					`).join('');
				} else {
					container.innerHTML = '<div class="empty-state"><div class="icon">📍</div>暂无收货地址</div>';
				}
			} catch (err) {
				container.innerHTML = '<div class="empty-state" style="color:#E53935;">加载失败</div>';
			}
		}

		async function deleteAddress(id) {
			if (!confirm('确定删除此地址？')) return;
			try {
				await fetch(API_BASE + '/addresses/' + id, {
					method: 'DELETE',
					headers: { 'Authorization': 'Bearer ' + token },
				});
				showToast('地址已删除');
				loadAddresses();
			} catch (err) { showToast('操作失败'); }
		}

		function showAddAddress() {
			document.getElementById('addressForm').style.display = 'block';
		}
		function hideAddressForm() {
			document.getElementById('addressForm').style.display = 'none';
		}
		async function saveAddress() {
			const body = {
				receiver_name: document.getElementById('addrName').value.trim(),
				receiver_phone: document.getElementById('addrPhone').value.trim(),
				province: document.getElementById('addrProvince').value.trim(),
				city: document.getElementById('addrCity').value.trim(),
				district: document.getElementById('addrDistrict').value.trim(),
				detail: document.getElementById('addrDetail').value.trim(),
				is_default: true,
			};
			if (!body.receiver_name || !body.receiver_phone || !body.province || !body.city) {
				return showToast('请填写完整信息');
			}
			try {
				const res = await fetch(API_BASE + '/addresses', {
					method: 'POST',
					headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
					body: JSON.stringify(body),
				});
				const data = await res.json();
				if (data.code === 200) {
					showToast('地址添加成功');
					hideAddressForm();
					document.getElementById('addrName').value = '';
					document.getElementById('addrPhone').value = '';
					document.getElementById('addrProvince').value = '';
					document.getElementById('addrCity').value = '';
					document.getElementById('addrDistrict').value = '';
					document.getElementById('addrDetail').value = '';
					loadAddresses();
				} else {
					showToast(data.msg);
				}
			} catch (err) { showToast('网络错误'); }
		}

		// ===== 个人资料 =====
		async function updateProfile() {
			const name = document.getElementById('profileName').value.trim();
			try {
				const res = await fetch(API_BASE + '/users/profile', {
					method: 'PUT',
					headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
					body: JSON.stringify({ name }),
				});
				const data = await res.json();
				if (data.code === 200) {
					showToast('资料已更新');
					user.name = name;
					localStorage.setItem('chase_shop_user', JSON.stringify(user));
					document.getElementById('userName').textContent = name || '用户';
					document.getElementById('userAvatar').textContent = (name || '用')[0];
				} else {
					showToast(data.msg);
				}
			} catch (err) { showToast('网络错误'); }
		}

		// ===== 修改密码 =====
		async function changePassword() {
			const oldPassword = document.getElementById('oldPassword').value.trim();
			const newPassword = document.getElementById('newPassword').value.trim();
			if (!oldPassword || !newPassword) return showToast('请输入原密码和新密码');
			try {
				const res = await fetch(API_BASE + '/users/password', {
					method: 'PUT',
					headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
					body: JSON.stringify({ oldPassword, newPassword }),
				});
				const data = await res.json();
				if (data.code === 200) {
					showToast('密码修改成功');
					document.getElementById('oldPassword').value = '';
					document.getElementById('newPassword').value = '';
				} else { showToast(data.msg); }
			} catch (err) { showToast('网络错误'); }
		}

		// 初始加载
		loadOrders();
	</script>
</body>
</html>
