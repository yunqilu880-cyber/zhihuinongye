<!doctype html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<title>管理后台 - 智慧农业</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="css/normalize.css">
	<link rel="stylesheet" href="css/style.css">
	<script src="js/auth-ui.js"></script>
	<style>
		body { background: #F5F5F5; }
		.admin-header {
			background: #1B5E20;
			color: #fff;
			padding: 16px 30px;
			display: flex;
			justify-content: space-between;
			align-items: center;
		}
		.admin-header h2 { margin: 0; font-size: 20px; }
		.admin-header .user-info { font-size: 14px; }
		.admin-header .user-info a { color: #C8E6C9; text-decoration: none; margin-left: 16px; }
		.admin-layout {
			display: flex;
			min-height: calc(100vh - 56px);
		}
		.admin-sidebar {
			width: 220px;
			background: #fff;
			border-right: 1px solid #E0E0E0;
			padding: 20px 0;
		}
		.admin-sidebar a {
			display: block;
			padding: 12px 30px;
			color: #333;
			text-decoration: none;
			font-size: 15px;
			font-weight: 700;
			transition: all .3s;
			border-left: 3px solid transparent;
		}
		.admin-sidebar a:hover, .admin-sidebar a.active {
			color: #2E7D32;
			background: #F1F8E9;
			border-left-color: #2E7D32;
		}
		.admin-main {
			flex: 1;
			padding: 30px;
			overflow-y: auto;
		}
		/* 统计卡片 */
		.stats-grid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
			gap: 20px;
			margin-bottom: 30px;
		}
		.stat-card {
			background: #fff;
			border-radius: 12px;
			padding: 24px;
			box-shadow: 0 2px 12px rgba(0,0,0,0.04);
		}
		.stat-card .value { font-size: 32px; font-weight: 700; color: #2E7D32; }
		.stat-card .label { color: #999; font-size: 14px; margin-top: 4px; }
		/* 表格 */
		.table-container {
			background: #fff;
			border-radius: 12px;
			overflow: hidden;
			box-shadow: 0 2px 12px rgba(0,0,0,0.04);
		}
		table {
			width: 100%;
			border-collapse: collapse;
		}
		th, td {
			padding: 12px 16px;
			text-align: left;
			border-bottom: 1px solid #F0F0F0;
			font-size: 14px;
		}
		th {
			background: #F9F9F9;
			color: #666;
			font-weight: 700;
			font-size: 13px;
		}
		tr:hover { background: #FAFAFA; }
		.badge {
			display: inline-block;
			padding: 3px 12px;
			border-radius: 999px;
			font-size: 12px;
			font-weight: 700;
		}
		.badge-admin { background: #FFE0B2; color: #E65100; }
		.badge-user { background: #E8F5E9; color: #2E7D32; }
		.badge-pending { background: #FFF3E0; color: #F57C00; }
		.badge-paid { background: #E3F2FD; color: #1976D2; }
		.badge-shipped { background: #E8F5E9; color: #388E3C; }
		.badge-completed { background: #E8F5E9; color: #2E7D32; }
		.badge-cancelled { background: #F5F5F5; color: #999; }
		.badge-on { background: #E8F5E9; color: #2E7D32; }
		.badge-off { background: #F5F5F5; color: #999; }
		.form-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
		.form-row .field { flex: 1; min-width: 120px; }
		.form-row .field label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; font-weight: 700; }
		.form-row .field input, .form-row .field select, .form-row .field textarea { width: 100%; padding: 8px 12px; border: 2px solid #E0E0E0; border-radius: 8px; font-size: 13px; outline: none; box-sizing: border-box; font-family: 'Arimo',sans-serif; }
		.form-row .field input:focus, .form-row .field select:focus, .form-row .field textarea:focus { border-color: #2E7D32; }
		.form-row .field textarea { resize: vertical; min-height: 60px; }
		.btn-sm {
			padding: 5px 14px;
			border-radius: 999px;
			font-size: 12px;
			font-weight: 700;
			cursor: pointer;
			border: none;
			font-family: 'Arimo', sans-serif;
		}
		.btn-success { background: #2E7D32; color: #fff; }
		.btn-success:hover { background: #1B5E20; }
		.btn-danger { background: #E53935; color: #fff; }
		.btn-danger:hover { background: #C62828; }
		.btn-outline { background: #fff; border: 2px solid #2E7D32; color: #2E7D32; }
		.btn-outline:hover { background: #E8F5E9; }
		.btn-warning { background: #F57C00; color: #fff; }
		.btn-warning:hover { background: #E65100; }
		/* 搜索栏 */
		.search-row {
			display: flex;
			gap: 12px;
			margin-bottom: 20px;
			align-items: center;
		}
		.search-row input, .search-row select {
			padding: 10px 16px;
			border: 2px solid #E0E0E0;
			border-radius: 8px;
			font-size: 14px;
			outline: none;
		}
		.search-row input:focus, .search-row select:focus { border-color: #2E7D32; }
		.search-row button {
			padding: 10px 24px;
			background: #2E7D32;
			color: #fff;
			border: none;
			border-radius: 8px;
			cursor: pointer;
			font-weight: 700;
			font-family: 'Arimo', sans-serif;
		}
		.pagination { display: flex; justify-content: center; gap: 8px; padding: 20px; }
		.pagination button {
			padding: 8px 16px;
			border: 2px solid #C8E6C9;
			background: #fff;
			border-radius: 8px;
			cursor: pointer;
			font-weight: 700;
			color: #2E7D32;
		}
		.pagination button.active { background: #2E7D32; color: #fff; border-color: #2E7D32; }
		.pagination button:disabled { color: #CCC; cursor: not-allowed; }
		.page-title {
			color: #1B5E20;
			font-size: 24px;
			margin-bottom: 20px;
		}
		.empty { text-align: center; padding: 40px; color: #999; }
		.toast {
			position: fixed;
			top: 20px; left: 50%;
			transform: translateX(-50%);
			background: #2E7D32; color: #fff;
			padding: 12px 28px; border-radius: 999px;
			z-index: 10000; font-weight: 700;
			opacity: 0; transition: opacity .3s; pointer-events: none;
		}
		.toast.show { opacity: 1; }
		.modal-overlay {
			position: fixed; top:0; left:0; width:100%; height:100%;
			background: rgba(0,0,0,0.5); z-index: 9999;
			display: none; align-items:center; justify-content:center;
		}
		.modal-overlay.show { display: flex; }
		.modal-box {
			background: #fff; border-radius: 16px; padding: 30px;
			max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto;
		}
		.modal-box h3 { color: #2E7D32; margin-bottom: 16px; }
		.modal-box .close-btn {
			float: right; background: none; border: none; font-size: 22px;
			cursor: pointer; color: #999;
		}
	</style>
</head>
<body>
	<div id="toast" class="toast"></div>
	<div class="modal-overlay" id="modalOverlay">
		<div class="modal-box" id="modalContent"></div>
	</div>

	<div class="admin-header">
		<h2>🌾 智慧农业 - 管理后台</h2>
		<div class="user-info">
			<span id="adminName">管理员</span>
			<a href="index.html">返回前台</a>
			<a href="#" onclick="logout()">退出登录</a>
		</div>
	</div>

	<div class="admin-layout">
		<div class="admin-sidebar">
			<a href="#" class="active" data-page="dashboard" onclick="switchPage('dashboard')">📊 数据概览</a>
			<a href="#" data-page="users" onclick="switchPage('users')">👥 用户管理</a>
		<a href="#" data-page="products" onclick="switchPage('products')">📦 商品管理</a>
		<a href="#" data-page="categories" onclick="switchPage('categories')">🏷️ 分类管理</a>
		<a href="#" data-page="orders" onclick="switchPage('orders')">📋 订单管理</a>
		</div>
		<div class="admin-main" id="mainContent">
			<div class="empty">加载中...</div>
		</div>
	</div>

	<script>
		const API_BASE = window.location.origin + '/api';
		const token = localStorage.getItem('chase_shop_token');
		const userStr = localStorage.getItem('chase_shop_user');
		const user = userStr ? JSON.parse(userStr) : null;

		if (!token) { window.location.href = 'login.html?redirect=admin.html'; }
		if (user) { document.getElementById('adminName').textContent = user.name || user.username; }

		function showToast(msg) {
			const t = document.getElementById('toast');
			t.textContent = msg; t.classList.add('show');
			setTimeout(() => t.classList.remove('show'), 2000);
		}

		function logout() {
			localStorage.removeItem('chase_shop_token');
			localStorage.removeItem('chase_shop_user');
			window.location.href = 'login.html';
		}

		// 侧边栏切换
		function switchPage(page) {
			document.querySelectorAll('.admin-sidebar a').forEach(a => a.classList.remove('active'));
			document.querySelector(`[data-page="${page}"]`).classList.add('active');
		if (page === 'dashboard') loadDashboard();
		else if (page === 'users') loadUserList();
		else if (page === 'products') loadProductList();
		else if (page === 'categories') loadCategoryList();
		else if (page === 'orders') loadOrderList();
		}

		// 通用请求
		async function api(url, options = {}) {
			options.headers = { ...options.headers, 'Authorization': 'Bearer ' + token };
			const res = await fetch(API_BASE + url, options);
			return res.json();
		}

		// ========== 仪表盘 ==========
		async function loadDashboard() {
			const container = document.getElementById('mainContent');
			try {
				const data = await api('/admin/stats');
				if (data.code === 200) {
					const s = data.data;
					container.innerHTML = '<h3 class="page-title">📊 数据概览</h3><div class="stats-grid">' +
						'<div class="stat-card"><div class="value">' + s.userCount + '</div><div class="label">注册用户</div></div>' +
						'<div class="stat-card"><div class="value">' + s.productCount + '</div><div class="label">商品数量</div></div>' +
						'<div class="stat-card"><div class="value">' + s.orderCount + '</div><div class="label">订单总数</div></div>' +
						'<div class="stat-card"><div class="value">¥' + Number(s.totalRevenue).toFixed(2) + '</div><div class="label">总营收（已付款）</div></div>' +
						'<div class="stat-card"><div class="value">' + s.pendingOrders + '</div><div class="label">待处理订单</div></div>' +
						'</div>';
				} else {
					container.innerHTML = `<div class="empty" style="color:#E53935;">${data.msg || '无权限访问管理后台'}</div>`;
				}
			} catch (err) {
				container.innerHTML = '<div class="empty" style="color:#E53935;">加载失败</div>';
			}
		}

		// ========== 用户管理 ==========
		let userPage = 1;
		let userKeyword = '';

		async function loadUserList() {
			const container = document.getElementById('mainContent');
			container.innerHTML = `
				<h3 class="page-title">👥 用户管理</h3>
				<div class="search-row">
					<input type="text" id="userSearch" placeholder="搜索账号/昵称/手机号" value="${userKeyword}" onkeydown="if(event.key==='Enter')searchUsers()">
					<button onclick="searchUsers()">搜索</button>
				</div>
				<div class="table-container"><div id="userTable"><div class="empty">加载中...</div></div></div>
				<div class="pagination" id="userPager"></div>`;
			await fetchUsers();
		}

		function searchUsers() {
			userKeyword = document.getElementById('userSearch').value.trim();
			userPage = 1;
			fetchUsers();
		}

		async function fetchUsers() {
			try {
				const params = new URLSearchParams({ page: userPage, pageSize: 15 });
				if (userKeyword) params.append('keyword', userKeyword);
				const data = await api('/admin/users?' + params.toString());
				if (data.code === 200) {
					renderUsers(data.data);
				} else {
					document.getElementById('userTable').innerHTML = `<div class="empty" style="color:#E53935;">${data.msg}</div>`;
				}
			} catch (err) {
				document.getElementById('userTable').innerHTML = '<div class="empty" style="color:#E53935;">加载失败</div>';
			}
		}

		function renderUsers(result) {
			const { list, total, page, pageSize, totalPages } = result;
			const container = document.getElementById('userTable');
			if (list.length === 0) {
				container.innerHTML = '<div class="empty">暂无用户</div>';
				document.getElementById('userPager').innerHTML = '';
				return;
			}
			const statusMap = { user: '普通用户', admin: '管理员' };
			container.innerHTML = `
				<table>
					<thead><tr>
						<th>ID</th><th>账号</th><th>昵称</th><th>角色</th><th>注册时间</th><th>操作</th>
					</tr></thead>
					<tbody>${list.map(u => `
						<tr>
							<td>${u.id}</td>
							<td>${u.username}</td>
							<td>${u.name || '-'}</td>
							<td><span class="badge ${u.role === 'admin' ? 'badge-admin' : 'badge-user'}">${statusMap[u.role] || u.role}</span></td>
							<td>${new Date(u.created_at).toLocaleString('zh-CN')}</td>
							<td>
								${u.role !== 'admin' ? `<button class="btn-sm btn-warning" onclick="setAdmin(${u.id})">设为管理员</button>` : `<button class="btn-sm btn-outline" onclick="setUser(${u.id})">取消管理员</button>`}
								${u.role !== 'admin' ? `<button class="btn-sm btn-danger" onclick="deleteUser(${u.id})" style="margin-left:6px;">删除</button>` : ''}
							</td>
						</tr>`).join('')}</tbody>
				</table>`;

			// 分页
			let pager = '';
			pager += `<button onclick="goUserPage(${page - 1})" ${page <= 1 ? 'disabled' : ''}>‹</button>`;
			for (let i = 1; i <= totalPages; i++) {
				pager += `<button class="${i === page ? 'active' : ''}" onclick="goUserPage(${i})">${i}</button>`;
			}
			pager += `<button onclick="goUserPage(${page + 1})" ${page >= totalPages ? 'disabled' : ''}>›</button>`;
			document.getElementById('userPager').innerHTML = pager;
		}

		function goUserPage(p) { userPage = p; fetchUsers(); }

		async function setAdmin(userId) {
			if (!confirm('确认将该用户设为管理员？')) return;
			const data = await api('/admin/users/' + userId + '/role', {
				method: 'PUT',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({ role: 'admin' }),
			});
			if (data.code === 200) { showToast('已设为管理员'); fetchUsers(); }
			else showToast(data.msg);
		}

		async function setUser(userId) {
			if (!confirm('确认取消该用户的管理员权限？')) return;
			const data = await api('/admin/users/' + userId + '/role', {
				method: 'PUT',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({ role: 'user' }),
			});
			if (data.code === 200) { showToast('已取消管理员'); fetchUsers(); }
			else showToast(data.msg);
		}

		async function deleteUser(userId) {
			if (!confirm('确认删除此用户？此操作不可恢复！')) return;
			const data = await api('/admin/users/' + userId, { method: 'DELETE' });
			if (data.code === 200) { showToast('用户已删除'); fetchUsers(); }
			else showToast(data.msg);
		}

// ========== 商品管理 ==========
let productPage=1,productKeyword='',productCategory='',productOnSale='';
async function loadProductList(){
	const c=document.getElementById('mainContent');
	c.innerHTML='<h3 class="page-title">📦 商品管理</h3><div class="search-row"><input id="productSearch" placeholder="搜索商品名/描述" value="'+productKeyword+'"><select id="productCategoryFilter"><option value="">全部分类</option></select><select id="productOnSaleFilter"><option value="">全部状态</option><option value="1">上架中</option><option value="0">已下架</option></select><button onclick="searchProducts()">搜索</button><button onclick="showProductForm()" style="background:#F57C00">+ 添加商品</button></div><div class="table-container"><div id="productTable"><div class="empty">加载中...</div></div></div><div class="pagination" id="productPager"></div>';
	loadCategoryOptions();
	fetchProducts();
}
async function loadCategoryOptions(){
	try{const d=await api('/admin/categories');if(d.code===200){const s=document.getElementById('productCategoryFilter');d.data.forEach(c=>{s.innerHTML+='<option value="'+c.id+'">'+c.icon+' '+c.name+'</option>'});if(productCategory)s.value=productCategory}}catch(e){}
}
function searchProducts(){productKeyword=document.getElementById('productSearch').value.trim();productCategory=document.getElementById('productCategoryFilter').value;productOnSale=document.getElementById('productOnSaleFilter').value;productPage=1;fetchProducts()}
async function fetchProducts(){
	try{const p=new URLSearchParams({page:productPage,pageSize:15});if(productKeyword)p.append('keyword',productKeyword);if(productCategory)p.append('category_id',productCategory);if(productOnSale!=='')p.append('is_on_sale',productOnSale);const d=await api('/admin/products?'+p.toString());if(d.code===200)renderProducts(d.data);else document.getElementById('productTable').innerHTML='<div class="empty" style="color:#E53935;">'+d.msg+'</div>'}catch(e){document.getElementById('productTable').innerHTML='<div class="empty" style="color:#E53935;">加载失败</div>'}
}
function renderProducts(r){
	const c=document.getElementById('productTable');
	if(r.list.length===0){c.innerHTML='<div class="empty">暂无商品</div>';document.getElementById('productPager').innerHTML='';return}
	c.innerHTML='<table><thead><tr><th>ID</th><th>名称</th><th>分类</th><th>价格</th><th>库存</th><th>销量</th><th>状态</th><th>操作</th></tr></thead><tbody>'+r.list.map(p=>'<tr><td>'+p.id+'</td><td>'+p.name+'</td><td>'+(p.category_name||'-')+'</td><td>¥'+p.price+'</td><td>'+p.stock+'</td><td>'+p.sales+'</td><td><span class="badge '+(p.is_on_sale?'badge-on':'badge-off')+'">'+(p.is_on_sale?'上架':'下架')+'</span></td><td><button class="btn-sm btn-outline" onclick="showProductForm('+p.id+')">编辑</button> <button class="btn-sm '+(p.is_on_sale?'btn-warning':'btn-success')+'" onclick="toggleProduct('+p.id+')">'+(p.is_on_sale?'下架':'上架')+'</button> <button class="btn-sm btn-danger" onclick="deleteProduct('+p.id+')">删除</button></td></tr>').join('')+'</tbody></table>';
	let pg='';pg+='<button onclick="goProductPage('+(r.page-1)+')" '+(r.page<=1?'disabled':'')+'>‹</button>';
	for(let i=1;i<=r.totalPages;i++)pg+='<button class="'+(i===r.page?'active':'')+'" onclick="goProductPage('+i+')">'+i+'</button>';
	pg+='<button onclick="goProductPage('+(r.page+1)+')" '+(r.page>=r.totalPages?'disabled':'')+'>›</button>';
	document.getElementById('productPager').innerHTML=pg
}
function goProductPage(p){productPage=p;fetchProducts()}
async function showProductForm(editId){
	let title='添加商品',p={name:'',description:'',price:'',original_price:'',stock:'',image:'',category_id:'',badge:'',weight:'',specs:'',is_featured:0,is_on_sale:1};
	if(editId){title='编辑商品';const d=await api('/admin/products?pageSize=200');if(d.code===200){const found=d.data.list.find(x=>x.id===editId);if(found)p=found}}
	try{const cd=await api('/admin/categories');const catOpts=cd.code===200?cd.data.map(c=>'<option value="'+c.id+'"'+(p.category_id==c.id?' selected':'')+'>'+c.icon+' '+c.name+'</option>').join(''):'';
	document.getElementById('modalContent').innerHTML='<button class="close-btn" onclick="closeModal()">✕</button><h3>'+title+'</h3><form id="productForm"><div class="form-row"><div class="field"><label>商品名称 *</label><input name="name" value="'+p.name+'" required></div><div class="field"><label>分类</label><select name="category_id"><option value="">无</option>'+catOpts+'</select></div></div><div class="form-row"><div class="field"><label>售价 *</label><input name="price" type="number" step="0.01" value="'+p.price+'"></div><div class="field"><label>原价</label><input name="original_price" type="number" step="0.01" value="'+(p.original_price||'')+'"></div><div class="field"><label>库存</label><input name="stock" type="number" value="'+(p.stock||0)+'"></div></div><div class="form-row"><div class="field"><label>角标</label><input name="badge" value="'+(p.badge||'')+'"></div><div class="field"><label>规格</label><input name="weight" value="'+(p.weight||'')+'"></div><div class="field"><label>推荐</label><select name="is_featured"><option value="0"'+(p.is_featured==0?' selected':'')+'>否</option><option value="1"'+(p.is_featured==1?' selected':'')+'>是</option></select></div></div><div class="form-row"><div class="field"><label>描述</label><textarea name="description" rows="2">'+(p.description||'')+'</textarea></div></div><div class="form-row"><div class="field"><label>规格说明（每行一条）</label><textarea name="specs" rows="3">'+(p.specs||'')+'</textarea></div></div><button type="submit" class="btn-sm btn-success" style="padding:10px 24px;font-size:14px;">保 存</button>'+(editId?'<button type="button" class="btn-sm btn-danger" style="margin-left:8px;padding:10px 24px;font-size:14px;" onclick="deleteProduct('+editId+');closeModal()">删 除</button>':'')+'</form>';
	document.getElementById('productForm').addEventListener('submit',async function(e){e.preventDefault();const fd=new FormData(this);const body={};for(let[k,v] of fd)body[k]=v;body.is_featured=parseInt(body.is_featured);body.category_id=body.category_id||null;body.price=parseFloat(body.price);body.original_price=body.original_price?parseFloat(body.original_price):null;body.stock=parseInt(body.stock);const url=editId?'/admin/products/'+editId:'/admin/products';const method=editId?'PUT':'POST';const r=await api(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});if(r.code===200){showToast(title+'成功');closeModal();fetchProducts()}else showToast(r.msg)});
	document.getElementById('modalOverlay').classList.add('show')}catch(e){showToast('加载失败')}
}
async function toggleProduct(id){const d=await api('/admin/products/'+id+'/toggle',{method:'PUT'});if(d.code===200){showToast(d.msg);fetchProducts()}else showToast(d.msg)}
async function deleteProduct(id){if(!confirm('确认删除此商品？'))return;const d=await api('/admin/products/'+id,{method:'DELETE'});if(d.code===200){showToast('商品已删除');fetchProducts()}else showToast(d.msg)}

// ========== 分类管理 ==========
async function loadCategoryList(){
	const c=document.getElementById('mainContent');
	c.innerHTML='<h3 class="page-title">🏷️ 分类管理</h3><button class="btn-sm btn-warning" onclick="showCategoryForm()" style="padding:8px 20px;margin-bottom:12px;">+ 添加分类</button><div class="table-container"><div id="categoryTable"><div class="empty">加载中...</div></div></div>';
	fetchCategories()
}
async function fetchCategories(){
	try{const d=await api('/admin/categories');if(d.code===200){const tbl=document.getElementById('categoryTable');if(d.data.length===0){tbl.innerHTML='<div class="empty">暂无分类</div>';return}
	tbl.innerHTML='<table><thead><tr><th>ID</th><th>图标</th><th>名称</th><th>排序</th><th>操作</th></tr></thead><tbody>'+d.data.map(c=>'<tr><td>'+c.id+'</td><td>'+c.icon+'</td><td>'+c.name+'</td><td>'+c.sort_order+'</td><td><button class="btn-sm btn-outline" onclick="showCategoryForm('+c.id+')">编辑</button> <button class="btn-sm btn-danger" onclick="deleteCategory('+c.id+')">删除</button></td></tr>').join('')+'</tbody></table>'}else tbl.innerHTML='<div class="empty" style="color:#E53935;">'+d.msg+'</div>'}catch(e){document.getElementById('categoryTable').innerHTML='<div class="empty" style="color:#E53935;">加载失败</div>'}
}
function showCategoryForm(editId){
	let title='添加分类',c={name:'',icon:'',sort_order:0};
	if(editId){title='编辑分类';api('/admin/categories').then(d=>{if(d.code===200){const f=d.data.find(x=>x.id===editId);if(f)c=f;renderCatForm()}}).catch(()=>{});renderCatForm();return}
	renderCatForm();
	function renderCatForm(){
		document.getElementById('modalContent').innerHTML='<button class="close-btn" onclick="closeModal()">✕</button><h3>'+title+'</h3><form id="catForm"><div class="form-row"><div class="field"><label>分类名称</label><input id="catName" value="'+c.name+'" required></div><div class="field"><label>图标（emoji）</label><input id="catIcon" value="'+c.icon+'"></div><div class="field"><label>排序</label><input id="catSort" type="number" value="'+c.sort_order+'"></div></div><button type="submit" class="btn-sm btn-success" style="padding:10px 24px;font-size:14px;">保 存</button></form>';
		document.getElementById('catForm').addEventListener('submit',async function(e){e.preventDefault();const body={name:document.getElementById('catName').value.trim(),icon:document.getElementById('catIcon').value.trim(),sort_order:parseInt(document.getElementById('catSort').value)||0};if(!body.name)return showToast('名称必填');const url=editId?'/admin/categories/'+editId:'/admin/categories';const method=editId?'PUT':'POST';const r=await api(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});if(r.code===200){showToast(title+'成功');closeModal();fetchCategories()}else showToast(r.msg)});
		document.getElementById('modalOverlay').classList.add('show')
	}
}
async function deleteCategory(id){if(!confirm('确认删除此分类？'))return;const d=await api('/admin/categories/'+id,{method:'DELETE'});if(d.code===200){showToast('分类已删除');fetchCategories()}else showToast(d.msg)}

// ========== 订单管理 ==========
		let orderPage = 1;
		let orderStatus = '';
		let orderKeyword = '';

		async function loadOrderList() {
			const container = document.getElementById('mainContent');
			container.innerHTML = `
				<h3 class="page-title">📦 订单管理</h3>
				<div class="search-row">
					<select id="orderStatusFilter" onchange="filterOrders()">
						<option value="">全部状态</option>
						<option value="pending">待支付</option>
						<option value="paid">已支付</option>
						<option value="shipped">已发货</option>
						<option value="delivered">运输中</option>
						<option value="completed">已完成</option>
						<option value="cancelled">已取消</option>
					</select>
					<input type="text" id="orderSearch" placeholder="搜索订单号/收货人/电话" value="${orderKeyword}" onkeydown="if(event.key==='Enter')searchOrders()">
					<button onclick="searchOrders()">搜索</button>
				</div>
				<div class="table-container"><div id="orderTable"><div class="empty">加载中...</div></div></div>
				<div class="pagination" id="orderPager"></div>`;
			await fetchOrders();
		}

		function filterOrders() {
			orderStatus = document.getElementById('orderStatusFilter').value;
			orderPage = 1;
			fetchOrders();
		}

		function searchOrders() {
			orderKeyword = document.getElementById('orderSearch').value.trim();
			orderPage = 1;
			fetchOrders();
		}

		async function fetchOrders() {
			try {
				const params = new URLSearchParams({ page: orderPage, pageSize: 15 });
				if (orderStatus) params.append('status', orderStatus);
				if (orderKeyword) params.append('keyword', orderKeyword);
				const data = await api('/admin/orders?' + params.toString());
				if (data.code === 200) { renderOrders(data.data); }
				else { document.getElementById('orderTable').innerHTML = `<div class="empty" style="color:#E53935;">${data.msg}</div>`; }
			} catch (err) {
				document.getElementById('orderTable').innerHTML = '<div class="empty" style="color:#E53935;">加载失败</div>';
			}
		}

		const orderStatusMap = { pending: '待支付', paid: '已支付', shipped: '已发货', delivered: '运输中', completed: '已完成', cancelled: '已取消', refunding: '退款中', refunded: '已退款' };

		function renderOrders(result) {
			const { list, total, page, pageSize, totalPages } = result;
			const container = document.getElementById('orderTable');
			if (list.length === 0) {
				container.innerHTML = '<div class="empty">暂无订单</div>';
				document.getElementById('orderPager').innerHTML = '';
				return;
			}
			container.innerHTML = `
				<table>
					<thead><tr>
						<th>ID</th><th>订单号</th><th>用户</th><th>收货人</th><th>金额</th><th>状态</th><th>时间</th><th>操作</th>
					</tr></thead>
					<tbody>${list.map(o => `
						<tr>
							<td>${o.id}</td>
							<td title="${o.order_no}">${o.order_no.substring(o.order_no.length - 12)}</td>
							<td>${o.username || 'ID:' + o.user_id}</td>
							<td>${o.receiver_name}<br><small style="color:#999;">${o.receiver_phone}</small></td>
							<td style="font-weight:700;color:#E53935;">¥${o.total_amount}</td>
							<td><span class="badge badge-${o.status}">${orderStatusMap[o.status] || o.status}</span></td>
							<td>${new Date(o.created_at).toLocaleString('zh-CN')}</td>
							<td>
								<button class="btn-sm btn-outline" onclick="viewOrderDetail(${o.id})">详情</button>
								${o.status === 'paid' ? `<button class="btn-sm btn-success" onclick="updateOrderStatus(${o.id},'shipped')" style="margin-left:4px;">发货</button>` : ''}
								${o.status === 'shipped' ? `<button class="btn-sm btn-success" onclick="updateOrderStatus(${o.id},'completed')" style="margin-left:4px;">完成</button>` : ''}
							</td>
						</tr>`).join('')}</tbody>
				</table>`;

			let pager = '';
			pager += `<button onclick="goOrderPage(${page - 1})" ${page <= 1 ? 'disabled' : ''}>‹</button>`;
			for (let i = 1; i <= totalPages; i++) {
				pager += `<button class="${i === page ? 'active' : ''}" onclick="goOrderPage(${i})">${i}</button>`;
			}
			pager += `<button onclick="goOrderPage(${page + 1})" ${page >= totalPages ? 'disabled' : ''}>›</button>`;
			document.getElementById('orderPager').innerHTML = pager;
		}

		function goOrderPage(p) { orderPage = p; fetchOrders(); }

		async function updateOrderStatus(orderId, status) {
			const labels = { shipped: '确认发货', completed: '确认完成' };
			if (!confirm(`确定${labels[status] || '更新状态'}？`)) return;
			const data = await api('/admin/orders/' + orderId + '/status', {
				method: 'PUT',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({ status }),
			});
			if (data.code === 200) { showToast('状态已更新'); fetchOrders(); }
			else showToast(data.msg);
		}

		async function viewOrderDetail(orderId) {
			try {
				const data = await api('/admin/orders/' + orderId);
				if (data.code === 200) {
					const o = data.data;
					const items = (o.items || []).map(i => `
						<tr>
							<td>${i.product_name}</td>
							<td>¥${i.product_price}</td>
							<td>×${i.quantity}</td>
							<td style="font-weight:700;">¥${(i.product_price * i.quantity).toFixed(2)}</td>
						</tr>`).join('');
					document.getElementById('modalContent').innerHTML = `
						<button class="close-btn" onclick="closeModal()">✕</button>
						<h3>📋 订单详情 #${o.id}</h3>
						<p><b>订单号：</b>${o.order_no}</p>
						<p><b>用户：</b>${o.username || o.user_id} (${o.user_name || ''})</p>
						<p><b>状态：</b><span class="badge badge-${o.status}">${orderStatusMap[o.status] || o.status}</span></p>
						<p><b>收货人：</b>${o.receiver_name} ${o.receiver_phone}</p>
						<p><b>地址：</b>${o.receiver_address}</p>
						<p><b>备注：</b>${o.remark || '无'}</p>
						<p><b>时间：</b>${new Date(o.created_at).toLocaleString('zh-CN')}</p>
						<hr style="border-color:#E8F5E9;">
						<h4>商品明细</h4>
						<table><thead><tr><th>商品</th><th>单价</th><th>数量</th><th>小计</th></tr></thead><tbody>${items}</tbody></table>
						<p style="text-align:right;font-size:20px;font-weight:700;color:#E53935;margin-top:12px;">合计：¥${o.total_amount}</p>`;
					document.getElementById('modalOverlay').classList.add('show');
				}
			} catch (err) { showToast('加载失败'); }
		}

		function closeModal() {
			document.getElementById('modalOverlay').classList.remove('show');
		}
		document.getElementById('modalOverlay').addEventListener('click', function(e) {
			if (e.target === this) closeModal();
		});

		// 初始加载
		loadDashboard();
	</script>
</body>
</html>
